
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Video Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">
  <h3>AI Video Generator</h3>
  <select id="cat" class="form-select mb-2">
    <option value="viral">Viral</option>
    <option value="motivation">Motivation</option>
    <option value="facts">Facts</option>
    <option value="kids_bedtime">Kids Bedtime</option>
  </select>
  <select id="dur" class="form-select mb-2">
    <option value="60">1 Minute</option>
    <option value="300">5 Minutes</option>
    <option value="1800">30 Minutes</option>
  </select>
  <button class="btn btn-primary w-100 mb-3" onclick="gen()">Generate</button>
  <video id="v" controls class="w-100"></video>

  <script>
  function gen(){
    fetch("http://localhost:3000/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        category:cat.value,
        duration:dur.value
      })
    }).then(r=>r.json()).then(d=>{
      v.src=d.video;
    });
  }
  </script>
</body>
</html>
